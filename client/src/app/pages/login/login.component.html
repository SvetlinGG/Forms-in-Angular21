<body>
    <div class="content">
       <div class="text">
          Login Form
       </div>
       <form [formGroup]="loginForm" (ngSubmit)="login()" >
          <div class="field">
            <label></label>
             <input 
               id="email"
               type="email" 
               name="email"
               placeholder="type here your email"
               formControlName="email"
               />
             
          </div>
          <div class="field">
            <label></label>
             <input 
               id="password"
               type="password" 
               name="password"
               placeholder="*****"
               formControlName="password"
               />
             
          </div>
          <div class="forgot-pass">
             <a href="#">Forgot Password?</a>
          </div>
          <button>Sign in</button>
          <div class="sign-up">
             Not a member?
             <a href="#">signup now</a>
          </div>
       </form>
    </div>
 </body>
