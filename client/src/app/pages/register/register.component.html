<body>
    <div class="content">
       <div class="text">
          Register Form
       </div>
       <form #registerForm="ngForm" (ngSubmit)="formSubmitHandler()">
        <div class="form-group">
         <label for="name">User Name</label>
            <input 
               id="name"
               type="text" 
               name="name"
               name
               required
               ngModel
               #nameInput="ngModel" />
         </div>

          <div class="form-group">
            <label for="email">Email or Phone</label>
             <input 
               id="email"
               type="text" 
               name="email"
               email
               ngModel
               required 
               #emailInput="ngModel"
               />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
             <input 
               id="password"
               type="password" 
               name="password"
               ngModel
               required
               #passwordInput="ngModel"
               />
          </div>

          <div class="forgot-pass">
             <a href="#">Forgot Password?</a>
          </div>
          <button>Register</button>
          <div class="sign-up">
             Not a member?
             <a href="#">Sign Up</a>
          </div>
       </form>
    </div>
 </body>
