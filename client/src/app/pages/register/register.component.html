<body>
    <div class="content">
       <div class="text">
          Register Form
       </div>
       <form #registerForm="ngForm" (ngSubmit)="submitHandler()">
        <div class="field">
         <label>User Name</label>
            <input 
               type="text" 
               name="name"
               name
               required
               ngModel
               #nameInput="ngModel" />
            
            
         </div>
          <div class="field">
            <label>Email or Phone</label>
             <input 
               type="text" 
               name="email"
               email
               ngModel
               required 
               #emailInput="ngModel"
               />
             
             
          </div>
          <div class="field">
             <input type="password" required>
            
             <label>Password</label>
          </div>
          <div class="forgot-pass">
             <a href="#">Forgot Password?</a>
          </div>
          <button>Register</button>
          <div class="sign-up">
             Not a member?
             <a href="#">Sign Up</a>
          </div>
       </form>
    </div>
 </body>
